<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>爻命 - 华夏国学社区</title>
    <style>
        :root {
            --bg-dark: #0b0f17;
            --card-dark: #161f30;
            --accent-gold: #dfb26c;
            --accent-gold-hover: #f1c784;
            --text-light: #e2e8f0;
            --text-muted: #64748b;
            --border-color: #243249;
        }

        body { 
            margin: 0; padding: 0; 
            background-color: var(--bg-dark); 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", "PingFang SC", "Noto Serif CJK SC", serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; color: var(--text-light);
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
        }

        /* 国学风八卦星空背景微弱光晕装饰 */
        .bg-glow {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(223, 178, 108, 0.06) 0%, rgba(0,0,0,0) 70%);
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1; pointer-events: none;
        }

        .app-container { 
            width: 100%; max-width: 420px; 
            background: rgba(22, 31, 48, 0.85); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px; padding: 40px 30px;
            box-sizing: border-box; z-index: 10;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.4s ease-out;
        }
        
        /* 头部国学排版 */
        .auth-header { text-align: center; margin-bottom: 36px; }
        .auth-brand { 
            font-size: 28px; font-weight: 700; color: var(--accent-gold);
            letter-spacing: 6px; margin-bottom: 8px;
            background: linear-gradient(to right, #f6d365 0%, #fda085 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-subtitle { color: var(--text-muted); font-size: 13px; letter-spacing: 2px; }
        
        /* 表单输入框高级美化 */
        .form-group { margin-bottom: 24px; }
        .form-label { display: block; font-size: 12px; color: var(--accent-gold); margin-bottom: 8px; letter-spacing: 1px; opacity: 0.8; }
        
        .input-wrapper { position: relative; }
        .input-wrapper input { 
            width: 100%; padding: 14px 16px; 
            background: #090d15; border: 1px solid var(--border-color); 
            border-radius: 12px; box-sizing: border-box; font-size: 15px; 
            color: #fff; transition: all 0.25s ease; outline: none;
        }
        .input-wrapper input:focus { 
            border-color: var(--accent-gold); 
            box-shadow: 0 0 0 3px rgba(223, 178, 108, 0.15); 
        }
        .input-wrapper input::placeholder { color: #334155; }
        
        /* 密码眼睛按钮 */
        .pwd-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 14px;
        }

        /* 极具质感的朱砂暗红按钮 */
        .btn-action { 
            width: 100%; padding: 15px; 
            background: linear-gradient(135deg, #881c1c 0%, #661010 100%);
            color: #fff; border: none; border-radius: 12px; 
            font-size: 15px; font-weight: 600; cursor: pointer; letter-spacing: 4px;
            margin-top: 10px; transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(136, 28, 28, 0.3);
        }
        .btn-action:hover { filter: brightness(1.1); }
        .btn-action:active { transform: scale(0.98); opacity: 0.9; }
        
        .auth-toggle { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-muted); }
        .auth-toggle span { color: var(--accent-gold); font-weight: 600; cursor: pointer; margin-left: 4px; }
        .auth-toggle span:hover { color: var(--accent-gold-hover); text-decoration: underline; }

        /* 优雅的测试账号模块（不再生硬） */
        .demo-zone {
            margin-top: 30px; padding-top: 20px;
            border-top: 1px dashed rgba(36, 50, 73, 0.6);
            text-align: center;
        }
        .btn-demo {
            background: rgba(9, 13, 21, 0.6);
            border: 1px dashed var(--border-color);
            color: #94a3b8; padding: 8px 16px; border-radius: 20px;
            font-size: 12px; cursor: pointer; transition: all 0.2s ease;
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn-demo:hover {
            border-color: var(--accent-gold);
            color: var(--accent-gold);
            background: rgba(223, 178, 108, 0.05);
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="app-container">
        <div class="auth-header">
            <div class="auth-brand">爻命</div>
            <div class="auth-subtitle">华夏国学社区 · 探寻天机</div>
        </div>

        <form onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label">手机号码</label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" placeholder="请输入您的11位手机号" maxlength="11" required />
                </div>
            </div>

            <div class="form-group">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <label class="form-label">登录密码</label>
                    <span style="font-size: 11px; color: var(--text-muted); cursor: pointer; margin-bottom: 8px;">忘记密码？</span>
                </div>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码" required />
                    <button type="button" class="pwd-toggle" onclick="togglePassword()">👁️</button>
                </div>
            </div>

            <button type="submit" class="btn-action">安 全 登 录</button>
        </form>

        <div class="auth-toggle">
            还没有账号？<span onclick="alert('进入注册流程')">立即注册</span>
        </div>

        <div class="demo-zone">
            <button class="btn-demo" onclick="fillDemoAccount()">
                ✨ <span>点击一键填入测试大师账号</span>
            </button>
        </div>
    </div>

    <script>
        // 控制密码可见性
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
            } else {
                pwdInput.type = 'password';
            }
        }

        // 优雅的一键填入测试账号功能
        function fillDemoAccount() {
            document.getElementById('phone').value = '15500002160';
            document.getElementById('password').value = 'password123';
        }

        // 登录提交事件
        function handleLogin(e) {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            
            // 这里可以对接您的后续主框架跳转或 API 请求
            alert('登录中...\n手机号: ' + phone);
        }
    </script>

</body>
</html>
